name: app
description: "Flutter weighing scale app."
publish_to: 'none'
version: 1.0.2+4

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  image_picker: ^1.0.7
  uuid: ^4.3.3
  google_mlkit_text_recognition: ^0.13.0
  permission_handler: ^11.3.1
  flutter_blue_plus: ^1.31.0
  mqtt_client: ^10.0.0
  shared_preferences: ^2.2.0
  http: ^1.2.00
  share_plus: ^7.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Kitchen_bdy_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#f9f7f2"
  adaptive_icon_foreground: "assets/Kitchen_bdy_logo.png"
